<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify Your Email</title>
</head>
<body style="margin: 0; padding: 0; background-color: #121212; font-family: Arial, sans-serif;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #121212;">
        <tr>
            <td align="center" style="padding: 60px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="500" style="background-color: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #333333;">
                    <tr>
                        <td style="padding: 50px 40px; text-align: center;">
                            <h1 style="margin: 0 0 10px 0; color: #e50914; font-size: 24px; letter-spacing: 2px;">ShowTick</h1>
                            <h2 style="margin: 0 0 30px 0; color: #ffffff; font-size: 20px;">Verify Your Email</h2>
                            <p style="margin: 0 0 30px 0; color: #aaaaaa; font-size: 16px; line-height: 1.5;">Welcome {{user_name}}! Please use the verification code below to complete your registration.</p>
                            
                            <!-- OTP Box -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="margin-bottom: 30px;">
                                <tr>
                                    <td align="center">
                                        <div style="background-color: #2a2a2a; border: 1px dashed #e50914; padding: 20px; border-radius: 8px; display: inline-block;">
                                            <span style="color: #ffffff; font-size: 36px; font-weight: bold; letter-spacing: 10px; font-family: 'Courier New', Courier, monospace;">{{otp_code}}</span>
                                        </div>
                                    </td>
                                </tr>
                            </table>

                            <p style="margin: 0; color: #888888; font-size: 14px;">This code will expire in <strong style="color: #ffffff;">10 minutes</strong>. If you didn't request this, you can safely ignore this email.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px; background-color: #181818; text-align: center; border-top: 1px solid #333333;">
                            <p style="margin: 0; color: #555555; font-size: 12px;">&copy; 2026 ShowTick Movies. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
