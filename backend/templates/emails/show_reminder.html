<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml" lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Show Starting Soon</title>
</head>
<body style="margin: 0; padding: 0; background-color: #121212; font-family: Arial, sans-serif;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #121212;">
        <tr>
            <td align="center" style="padding: 60px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #1e1e1e; border-radius: 12px; overflow: hidden; border: 1px solid #e50914;">
                    <tr>
                        <td style="padding: 50px 40px; text-align: center;">
                            <h2 style="margin: 0 0 20px 0; color: #ffffff; font-size: 24px;">Don't Miss the Intro! 🍿</h2>
                            <p style="margin: 0 0 30px 0; color: #aaaaaa; font-size: 16px; line-height: 1.5;">Hi {{user_name}}, your show <strong style="color: #ffffff;">{{movie_name}}</strong> is starting in just <strong style="color: #e50914;">2 hours</strong>. We recommend arriving at the theater at least 15 minutes early to grab your snacks!</p>
                            
                            <!-- Showtime Info -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #2a2a2a; border-radius: 8px; margin-bottom: 30px;">
                                <tr>
                                    <td style="padding: 20px;">
                                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td align="left">
                                                    <span style="color: #888888; font-size: 12px; text-transform: uppercase;">Theater</span><br />
                                                    <span style="color: #ffffff; font-size: 16px; font-weight: bold;">{{theater_name}}</span>
                                                </td>
                                                <td align="right">
                                                    <span style="color: #888888; font-size: 12px; text-transform: uppercase;">Time</span><br />
                                                    <span style="color: #ffffff; font-size: 16px; font-weight: bold;">{{show_time}}</span>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                            <!-- CTA Button -->
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center">
                                        <a href="#" style="background-color: #e50914; color: #ffffff; padding: 16px 36px; text-decoration: none; border-radius: 30px; font-weight: bold; font-size: 16px; display: inline-block;">View Ticket</a>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px; background-color: #181818; text-align: center; border-top: 1px solid #333333;">
                            <p style="margin: 0; color: #555555; font-size: 12px;">See you at the movies! &copy; 2026 ShowTick.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
